<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SupportDesk CRM{% endblock %}</title>
  <meta name="description" content="{% block description %}Customer Support Ticketing CRM — manage, track, and resolve support tickets.{% endblock %}" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff', 100:'#e0e7ff', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca', 900:'#1e1b4b' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          animation: {
            'fade-in': 'fadeIn .25s ease-out',
            'slide-up': 'slideUp .3s ease-out',
          },
          keyframes: {
            fadeIn:  { from: { opacity: 0 }, to: { opacity: 1 } },
            slideUp: { from: { opacity: 0, transform: 'translateY(12px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .status-open        { @apply bg-blue-500/20 text-blue-300 ring-1 ring-blue-400/30; }
    .status-in-progress { @apply bg-amber-500/20 text-amber-300 ring-1 ring-amber-400/30; }
    .status-closed      { @apply bg-emerald-500/20 text-emerald-300 ring-1 ring-emerald-400/30; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-full bg-slate-950 text-slate-100 antialiased">

  <!-- NAV -->
  <nav class="sticky top-0 z-50 border-b border-slate-800 bg-slate-950/90 backdrop-blur-md">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-16 items-center justify-between">

        <!-- Logo -->
        <a href="/" class="flex items-center gap-3 group" id="nav-logo">
          <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-brand-500 to-violet-600 shadow-lg shadow-brand-500/30 transition-transform group-hover:scale-105">
            <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </div>
          <div class="leading-tight">
            <p class="text-sm font-bold tracking-wide text-white">SupportDesk</p>
            <p class="text-[10px] font-medium uppercase tracking-widest text-slate-500">CRM</p>
          </div>
        </a>

        <!-- Nav Links -->
        <div class="hidden sm:flex items-center gap-1">
          <a href="/" id="nav-tickets"
             class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-400 transition-colors hover:bg-slate-800 hover:text-white">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Tickets
          </a>
        </div>

        <!-- New Ticket Button -->
        <a href="/tickets/new" id="nav-new-ticket"
           class="flex items-center gap-2 rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white shadow-md shadow-brand-500/25 transition-all hover:bg-brand-500 hover:shadow-brand-500/40 active:scale-95">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          New Ticket
        </a>

      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 animate-fade-in">
    {% block content %}{% endblock %}
  </main>

  <!-- TOAST CONTAINER -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- SHARED JS -->
  <script>
    // ── Status badge helper ─────────────────────────────────────────────
    function statusBadge(status) {
      const map = {
        'Open':        'bg-blue-500/20 text-blue-300 ring-1 ring-blue-400/30',
        'In Progress': 'bg-amber-500/20 text-amber-300 ring-1 ring-amber-400/30',
        'Closed':      'bg-emerald-500/20 text-emerald-300 ring-1 ring-emerald-400/30',
      };
      const cls = map[status] || 'bg-slate-700 text-slate-300';
      return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold ${cls}">${status}</span>`;
    }

    // ── Format datetime ─────────────────────────────────────────────────
    function fmtDate(str) {
      if (!str) return '—';
      const d = new Date(str.replace(' ', 'T') + 'Z');
      return d.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
    }

    // ── Toast notification ──────────────────────────────────────────────
    function toast(msg, type = 'success') {
      const colors = {
        success: 'bg-emerald-600 text-white',
        error:   'bg-red-600 text-white',
        info:    'bg-brand-600 text-white',
      };
      const el = document.createElement('div');
      el.className = `pointer-events-auto flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium shadow-2xl
                      ${colors[type]} transition-all duration-300 translate-y-2 opacity-0`;
      el.innerHTML = `<span>${msg}</span>`;
      document.getElementById('toast-container').appendChild(el);
      requestAnimationFrame(() => {
        el.classList.remove('translate-y-2', 'opacity-0');
      });
      setTimeout(() => {
        el.classList.add('translate-y-2', 'opacity-0');
        setTimeout(() => el.remove(), 300);
      }, 3500);
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
