{% extends "base.html" %}
{% block title %}{{ ticket_id }} — SupportDesk CRM{% endblock %}
{% block description %}View and manage support ticket {{ ticket_id }}.{% endblock %}

{% block content %}

<!-- ── BACK + SKELETON (replaced by JS) ─────────────────────────────────── -->
<div class="mb-6 flex items-center gap-4">
  <a href="/" id="back-to-list"
     class="flex h-9 w-9 items-center justify-center rounded-lg border border-slate-700 bg-slate-800
            text-slate-400 transition-all hover:border-slate-600 hover:text-white active:scale-95">
    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <div id="ticket-header-text">
    <div class="animate-pulse h-7 w-40 rounded bg-slate-800"></div>
    <div class="animate-pulse mt-1 h-4 w-60 rounded bg-slate-800"></div>
  </div>
</div>

<!-- ── MAIN GRID ─────────────────────────────────────────────────────────── -->
<div class="grid gap-6 lg:grid-cols-3">

  <!-- LEFT COLUMN: Ticket details + notes -->
  <div class="space-y-6 lg:col-span-2">

    <!-- Ticket Info Card -->
    <div id="ticket-info-card"
         class="animate-slide-up rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-xl">
      <div class="animate-pulse space-y-3">
        <div class="h-5 w-1/2 rounded bg-slate-800"></div>
        <div class="h-4 w-3/4 rounded bg-slate-800"></div>
        <div class="h-4 w-2/3 rounded bg-slate-800"></div>
        <div class="h-24 rounded bg-slate-800"></div>
      </div>
    </div>

    <!-- Notes Timeline -->
    <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-xl">
      <h2 class="mb-5 text-sm font-semibold uppercase tracking-wider text-slate-400">Activity &amp; Notes</h2>

      <div id="notes-list" class="space-y-3">
        <!-- injected by JS -->
      </div>

      <!-- Add Note Form -->
      <div class="mt-6 border-t border-slate-800 pt-5">
        <label for="note-text" class="mb-2 block text-sm font-semibold text-slate-200">Add a Note</label>
        <textarea id="note-text" rows="3"
                  placeholder="Write an internal note or update…"
                  class="w-full resize-none rounded-xl border border-slate-700 bg-slate-800/70 px-4 py-3 text-sm
                         text-slate-100 placeholder-slate-500 outline-none transition
                         focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30"></textarea>
        <div class="mt-3 flex justify-end">
          <button id="add-note-btn"
                  class="flex items-center gap-2 rounded-xl bg-slate-700 px-5 py-2.5 text-sm font-semibold
                         text-slate-200 transition-all hover:bg-slate-600 hover:text-white active:scale-95
                         disabled:cursor-not-allowed disabled:opacity-50">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
            </svg>
            Post Note
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- RIGHT COLUMN: Meta + Status update -->
  <div class="space-y-6">

    <!-- Status Update Card -->
    <div class="animate-slide-up rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-xl">
      <h2 class="mb-4 text-sm font-semibold uppercase tracking-wider text-slate-400">Update Status</h2>

      <div class="space-y-3">
        <label for="status-select" class="block text-xs font-medium text-slate-400">Current Status</label>
        <select id="status-select"
                class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm font-medium
                       text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30">
          <option value="Open">🔵 Open</option>
          <option value="In Progress">🟡 In Progress</option>
          <option value="Closed">🟢 Closed</option>
        </select>

        <button id="update-status-btn"
                class="flex w-full items-center justify-center gap-2 rounded-xl bg-brand-600 px-4 py-3 text-sm
                       font-semibold text-white shadow-lg shadow-brand-500/25 transition-all
                       hover:bg-brand-500 hover:shadow-brand-500/40 active:scale-[.98]
                       disabled:cursor-not-allowed disabled:opacity-50">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5 13l4 4L19 7"/>
          </svg>
          Save Status
        </button>
      </div>
    </div>

    <!-- Ticket Metadata Card -->
    <div id="meta-card"
         class="rounded-2xl border border-slate-800 bg-slate-900/70 p-6 shadow-xl space-y-4">
      <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Ticket Info</h2>
      <div class="animate-pulse space-y-3">
        <div class="h-4 w-full rounded bg-slate-800"></div>
        <div class="h-4 w-3/4 rounded bg-slate-800"></div>
        <div class="h-4 w-2/3 rounded bg-slate-800"></div>
      </div>
    </div>

  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  const TICKET_ID = "{{ ticket_id }}";
  let ticket = null;

  // ── Fetch full ticket ──────────────────────────────────────────────────
  async function loadTicket() {
    try {
      const res = await fetch(`/api/tickets/${TICKET_ID}`);
      if (!res.ok) {
        if (res.status === 404) {
          renderNotFound();
        } else {
          toast('Failed to load ticket.', 'error');
        }
        return;
      }
      ticket = await res.json();
      renderTicket(ticket);
    } catch {
      toast('Network error — could not reach the server.', 'error');
    }
  }

  // ── Render ticket detail ───────────────────────────────────────────────
  function renderTicket(t) {
    // Header
    document.getElementById('ticket-header-text').innerHTML = `
      <div class="flex flex-wrap items-center gap-3">
        <h1 class="text-2xl font-bold text-white font-mono">${esc(t.ticket_id)}</h1>
        ${statusBadge(t.status)}
      </div>
      <p class="mt-1 text-sm text-slate-400 truncate">${esc(t.subject)}</p>
    `;
    document.title = `${t.ticket_id} — SupportDesk CRM`;

    // Info card
    document.getElementById('ticket-info-card').innerHTML = `
      <div class="mb-5 flex flex-wrap items-start gap-4">
        <div class="flex-1 min-w-0">
          <h2 class="text-lg font-bold text-white truncate">${esc(t.subject)}</h2>
          <div class="mt-2 flex flex-wrap items-center gap-3 text-sm text-slate-400">
            <span class="flex items-center gap-1.5">
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              ${esc(t.customer_name)}
            </span>
            <span class="flex items-center gap-1.5">
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <a href="mailto:${esc(t.customer_email)}" class="hover:text-brand-400 transition-colors">${esc(t.customer_email)}</a>
            </span>
          </div>
        </div>
      </div>
      <div class="rounded-xl bg-slate-800/60 px-5 py-4">
        <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-slate-500">Description</p>
        <p class="text-sm leading-relaxed text-slate-300 whitespace-pre-wrap">${esc(t.description)}</p>
      </div>
    `;

    // Status select
    document.getElementById('status-select').value = t.status;

    // Meta card
    document.getElementById('meta-card').innerHTML = `
      <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Ticket Info</h2>
      <dl class="space-y-3 text-sm">
        ${metaRow('Ticket ID',   `<span class="font-mono text-brand-400">${esc(t.ticket_id)}</span>`)}
        ${metaRow('Status',      statusBadge(t.status))}
        ${metaRow('Customer',    esc(t.customer_name))}
        ${metaRow('Email',       `<a href="mailto:${esc(t.customer_email)}" class="text-brand-400 hover:underline">${esc(t.customer_email)}</a>`)}
        ${metaRow('Opened',      fmtDate(t.created_at))}
        ${metaRow('Last Updated',fmtDate(t.updated_at))}
        ${metaRow('Notes',       `${t.notes.length} note${t.notes.length !== 1 ? 's' : ''}`)}
      </dl>
    `;

    // Notes
    renderNotes(t.notes);
  }

  function metaRow(label, value) {
    return `
      <div class="flex flex-col gap-0.5">
        <dt class="text-xs font-medium text-slate-500">${label}</dt>
        <dd class="text-slate-200">${value}</dd>
      </div>
    `;
  }

  function renderNotes(notes) {
    const el = document.getElementById('notes-list');
    if (!notes || notes.length === 0) {
      el.innerHTML = `<p class="text-sm text-slate-600 italic">No notes yet. Add the first one below.</p>`;
      return;
    }
    el.innerHTML = notes.map((n, i) => `
      <div class="flex gap-3 animate-slide-up" style="animation-delay:${i * 40}ms">
        <div class="flex-shrink-0 mt-0.5">
          <div class="flex h-7 w-7 items-center justify-center rounded-full bg-brand-600/20 ring-1 ring-brand-500/30 text-xs font-bold text-brand-400">
            ${i + 1}
          </div>
        </div>
        <div class="flex-1 rounded-xl bg-slate-800/60 px-4 py-3">
          <p class="text-sm text-slate-200 whitespace-pre-wrap">${esc(n.note_text)}</p>
          <p class="mt-2 text-xs text-slate-600">${fmtDate(n.created_at)}</p>
        </div>
      </div>
    `).join('');
  }

  // ── Not found ──────────────────────────────────────────────────────────
  function renderNotFound() {
    document.getElementById('ticket-info-card').innerHTML = `
      <div class="flex flex-col items-center gap-4 py-12 text-center">
        <div class="text-5xl">🔍</div>
        <div>
          <p class="text-lg font-bold text-slate-200">Ticket not found</p>
          <p class="mt-1 text-sm text-slate-500">
            <strong class="text-white font-mono">${esc(TICKET_ID)}</strong> doesn't exist.
          </p>
          <a href="/" class="mt-4 inline-block text-sm text-brand-400 hover:underline">Back to all tickets</a>
        </div>
      </div>`;
  }

  // ── Update status ──────────────────────────────────────────────────────
  document.getElementById('update-status-btn').addEventListener('click', async () => {
    const btn = document.getElementById('update-status-btn');
    const newStatus = document.getElementById('status-select').value;

    btn.disabled = true;
    btn.querySelector('svg').innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>`;
    btn.querySelector('svg').classList.add('animate-spin');

    try {
      const res = await fetch(`/api/tickets/${TICKET_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
      const data = await res.json();

      if (res.ok) {
        toast(`Status updated to "${newStatus}"`, 'success');
        await loadTicket();
      } else {
        toast(data.detail || 'Update failed.', 'error');
      }
    } catch {
      toast('Network error.', 'error');
    } finally {
      btn.disabled = false;
      btn.querySelector('svg').innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>`;
      btn.querySelector('svg').classList.remove('animate-spin');
    }
  });

  // ── Add note ───────────────────────────────────────────────────────────
  document.getElementById('add-note-btn').addEventListener('click', async () => {
    const noteText = document.getElementById('note-text').value.trim();
    if (!noteText) {
      toast('Please write a note first.', 'info');
      document.getElementById('note-text').focus();
      return;
    }

    const btn = document.getElementById('add-note-btn');
    btn.disabled = true;
    btn.querySelector('span') ? btn.querySelector('span').textContent = 'Posting…' : null;

    try {
      const res = await fetch(`/api/tickets/${TICKET_ID}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note: noteText }),
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('note-text').value = '';
        toast('Note added!', 'success');
        await loadTicket();
      } else {
        toast(data.detail || 'Failed to add note.', 'error');
      }
    } catch {
      toast('Network error.', 'error');
    } finally {
      btn.disabled = false;
    }
  });

  // ── Allow Ctrl+Enter to post note ─────────────────────────────────────
  document.getElementById('note-text').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      document.getElementById('add-note-btn').click();
    }
  });

  // ── HTML escape ────────────────────────────────────────────────────────
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ───────────────────────────────────────────────────────────────
  loadTicket();
</script>
{% endblock %}
